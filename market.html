<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>市场快讯 · CampusQuant 校园财商</title>
    <!-- Shared design system -->
    <link rel="stylesheet" href="assets/css/tokens.css">
    <link rel="stylesheet" href="assets/css/base.css">
    <link rel="stylesheet" href="assets/css/nav.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/animations.css">
    <!-- Lucide icons -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@latest/dist/umd/lucide.min.js" defer></script>
    <style>
        /* ══════════ MARKET-specific styles only ══════════ */
        /* market 是终端式定高布局，需要锁定 viewport */
        html, body { height:100%; overflow:hidden; }
        body { min-height:initial; }
        /* market 使用 56px header（不是默认 70px），重写 header 高度 */
        header { height:var(--header-h); padding:0 48px; }

        /* ══ 指数滚动屏（逐行向上循环）══ */
        .ticker-wrap {
            margin-top:var(--header-h);
            height:var(--ticker-h);
            background:rgba(0,0,0,0.3);
            border-bottom:1px solid var(--border);
            overflow:hidden;
            flex-shrink:0;
            position:relative;
        }
        .ticker-slider {
            transition:transform 0.5s ease;
        }
        .ticker-row {
            display:grid;
            grid-template-columns:repeat(8, 1fr);
            height:calc(var(--ticker-h) / 2);
        }
        .ticker-item {
            display:flex; align-items:center; justify-content:center; gap:6px;
            padding:0 6px; white-space:nowrap;
            border-right:1px solid rgba(255,255,255,0.04);
            border-bottom:1px solid rgba(255,255,255,0.04);
        }
        .ticker-name { font-size:10px; color:var(--text-sub); }
        .ticker-price { font-size:11px; font-weight:700; color:#fff; }
        .ticker-pct { font-size:10px; font-weight:700; }
        .up   { color:var(--success); }
        .down { color:var(--danger); }
        .flat { color:var(--text-sub); }

        /* ══ 三栏主体 ══ */
        .terminal-grid {
            flex:1;
            display:grid;
            grid-template-columns: 2fr 5fr 3fr;
            gap:0;
            height:calc(100vh - var(--header-h) - var(--ticker-h));
            overflow:hidden;
        }

        .col { overflow-y:auto; border-right:1px solid var(--border); padding:12px; }
        .col:last-child { border-right:none; }
        .col::-webkit-scrollbar { width:4px; }
        .col::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.1); border-radius:2px; }

        /* ══ 左栏：板块 ══ */
        .col-left { padding:8px 6px; }
        .col-title {
            font-size:12px; font-weight:700; color:var(--text-sub);
            text-transform:uppercase; letter-spacing:0.5px;
            padding:6px 8px; margin-bottom:6px;
            display:flex; justify-content:space-between; align-items:center;
        }
        .col-title-time { font-size:10px; color:var(--text-dim); font-weight:400; }
        .sector-heatmap {
            display:grid;
            grid-template-columns: repeat(4, 1fr);
            gap:2px;
        }
        .sector-tile {
            border-radius:5px; padding:7px 3px;
            display:flex; flex-direction:column;
            align-items:center; justify-content:center;
            cursor:default; transition:opacity .2s;
            min-height:54px;
        }
        .sector-tile:hover { opacity:.8; }
        .sector-tile-name { font-size:9px; font-weight:600; color:rgba(255,255,255,.9); text-align:center; line-height:1.2; margin-bottom:1px; }
        .sector-tile-pct { font-size:10px; font-weight:800; color:rgba(255,255,255,.95); }

        /* ══ 中栏 ══ */
        .col-mid { display:flex; flex-direction:column; gap:10px; padding:10px 14px; }

        /* 情绪条 */
        .sentiment-row {
            display:flex; gap:12px; flex-shrink:0;
        }
        .sent-chip {
            flex:1; background:var(--card); border:1px solid var(--border);
            border-radius:8px; padding:6px 10px; text-align:center;
        }
        .sent-label { font-size:9px; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.3px; }
        .sent-val { font-size:15px; font-weight:700; margin-top:2px; }

        /* 热门标的 */
        .quotes-panel {
            background:var(--card); border:1px solid var(--border); border-radius:10px;
            overflow:hidden; flex-shrink:0;
        }
        .quotes-header {
            padding:8px 14px; border-bottom:1px solid var(--border);
            display:flex; justify-content:space-between; align-items:center;
        }
        .quotes-title { font-size:13px; font-weight:700; }
        .market-tabs { display:flex; gap:4px; }
        .tab-btn {
            padding:3px 10px; border-radius:14px; font-size:11px; font-weight:600;
            border:1px solid var(--border); color:var(--text-sub); cursor:pointer;
            background:transparent; transition:all 0.2s;
        }
        .tab-btn.active { border-color:var(--primary); color:var(--primary); background:rgba(79,172,254,.09); }

        #table-wrap { max-height:280px; overflow-y:auto; }
        table { width:100%; border-collapse:collapse; }
        thead th { padding:6px 10px; text-align:left; font-size:10px; font-weight:600; color:var(--text-dim); border-bottom:1px solid var(--border); position:sticky; top:0; background:#0d1120; }
        tbody tr { border-bottom:1px solid rgba(255,255,255,0.03); }
        tbody tr:hover { background:rgba(255,255,255,0.02); }
        tbody td { padding:7px 10px; font-size:12px; }
        .td-sym { font-weight:600; color:#fff; }
        .td-name { color:var(--text-sub); font-size:11px; }
        .td-price { font-weight:600; color:#fff; }
        .td-chg { font-weight:600; }

        /* K线区域 */
        .kline-panel {
            flex:1; background:var(--card); border:1px solid var(--border);
            border-radius:10px; display:flex; flex-direction:column; overflow:hidden; min-height:200px;
        }
        .kline-toolbar {
            display:flex; align-items:center; gap:8px; padding:8px 12px;
            border-bottom:1px solid var(--border); flex-shrink:0;
        }
        .kline-search-wrap { display:flex; gap:6px; flex:1; position:relative; }
        .kline-input {
            flex:1; background:rgba(255,255,255,.06); border:1px solid var(--border);
            border-radius:8px; padding:6px 10px; color:#fff; font-size:12px; outline:none;
        }
        .kline-input:focus { border-color:var(--primary); }
        .kline-input::placeholder { color:var(--text-dim); }
        .kline-btn {
            padding:6px 14px; border-radius:8px; border:none; cursor:pointer;
            background:linear-gradient(90deg,var(--primary),var(--secondary));
            color:#0b0f19; font-size:12px; font-weight:600; white-space:nowrap;
        }
        .kline-period-tabs { display:flex; gap:3px; }
        .kp-tab {
            padding:3px 8px; border-radius:12px; font-size:10px; font-weight:600;
            border:1px solid var(--border); color:var(--text-sub); cursor:pointer; background:transparent;
        }
        .kp-tab.active { border-color:var(--primary); color:var(--primary); background:rgba(79,172,254,.1); }

        .kline-info { display:flex; align-items:center; gap:10px; padding:4px 12px; flex-wrap:wrap; flex-shrink:0; }
        .kline-sym-name { font-size:13px; font-weight:700; color:#fff; }
        .kline-price { font-size:16px; font-weight:800; }
        .kline-chart-wrap { flex:1; position:relative; min-height:180px; }
        #kline-chart { width:100%; height:100%; position:absolute; inset:0; }
        .kline-placeholder { position:absolute; inset:0; display:flex; flex-direction:column;
            align-items:center; justify-content:center; color:var(--text-dim); gap:8px; font-size:12px; }
        .kline-placeholder.hide { display:none; }
        .kline-cta { padding:4px 12px; display:flex; align-items:center; gap:8px; flex-shrink:0; }
        .kline-cta a { display:inline-flex; align-items:center; gap:4px; padding:5px 12px;
            background:linear-gradient(90deg,var(--primary),var(--secondary));
            border-radius:8px; color:#0b0f19; font-weight:700; font-size:11px; text-decoration:none; }
        .kline-cta-sub { font-size:11px; color:var(--text-sub); }

        /* ══ 右栏：新闻竖排 ══ */
        .col-right { display:flex; flex-direction:column; padding:8px 10px; }
        .news-panel { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:6px; }
        .news-source-block {
            background:var(--card); border:1px solid var(--border);
            border-radius:8px;
            display:flex; flex-direction:column;
        }
        .news-source-header {
            padding:6px 10px; display:flex; align-items:center; gap:6px;
            border-bottom:1px solid rgba(255,255,255,0.04);
            font-size:12px; font-weight:700;
            flex-shrink:0;
        }
        .news-items-list {
            display:flex; flex-direction:column;
            padding:2px 0 4px;
        }
        .news-item {
            display:flex; gap:6px; padding:6px 10px; align-items:flex-start;
            border-bottom:1px solid rgba(255,255,255,0.03);
            text-decoration:none; transition:background .15s;
            margin-bottom:2px;
        }
        .news-item:last-child { border-bottom:none; margin-bottom:0; }
        .news-item:hover { background:rgba(255,255,255,.03); }
        .news-rank {
            width:16px; height:16px; border-radius:4px; flex-shrink:0;
            display:flex; align-items:center; justify-content:center;
            font-size:9px; font-weight:800; background:rgba(79,172,254,.12); color:var(--primary);
            margin-top:1px;
        }
        .news-rank.r1 { background:rgba(253,121,168,.2); color:var(--danger); }
        .news-rank.r2 { background:rgba(253,203,110,.15); color:var(--warn); }
        .news-rank.r3 { background:rgba(85,239,196,.12); color:var(--success); }
        .news-title {
            font-size:0.85rem; color:#e2e8f0; line-height:1.5;
            display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;
            overflow:hidden; text-overflow:ellipsis;
        }
        .news-empty { padding:12px; text-align:center; color:var(--text-dim); font-size:11px; }

        .update-bar {
            flex-shrink:0; padding:6px 8px; text-align:center;
            font-size:10px; color:var(--text-dim); border-top:1px solid var(--border);
        }

        @keyframes spin{to{transform:rotate(360deg)}}

        /* ══════════ PHASE 3 WOW ══════════ */
        /* ticker 数字 tabular-nums + 行切换时淡入 */
        .ticker-name, .ticker-price, .ticker-pct,
        .td-price, .td-chg, .sent-val, .kline-price {
            font-variant-numeric:tabular-nums;
        }
        .ticker-row { animation:fade-in .5s var(--ease-out); }
        .ticker-item { transition:background var(--d-fast); }
        .ticker-item:hover { background:rgba(79,172,254,.06); }

        /* sector tile hover: scale + soft glow */
        .sector-tile {
            transition:transform var(--d-base) var(--ease-out), box-shadow var(--d-base);
            position:relative;
            overflow:hidden;
        }
        .sector-tile::before {
            content:''; position:absolute; inset:0;
            background:linear-gradient(135deg,rgba(255,255,255,.08),transparent 60%);
            opacity:0; transition:opacity var(--d-base);
        }
        .sector-tile:hover {
            transform:translateY(-2px) scale(1.04);
            opacity:1;
            box-shadow:0 4px 14px rgba(0,0,0,.25);
        }
        .sector-tile:hover::before { opacity:1; }

        /* 表格行 hover 加亮 + sym 高亮 */
        tbody tr {
            transition:background var(--d-fast);
            cursor:pointer;
        }
        tbody tr:hover { background:rgba(79,172,254,.06); }
        tbody tr:hover .td-sym { color:var(--secondary); text-shadow:0 0 8px rgba(0,242,254,.4); }

        /* sentiment chip hover 微动 */
        .sent-chip {
            transition:all var(--d-base) var(--ease-out);
        }
        .sent-chip:hover {
            border-color:rgba(79,172,254,.35);
            transform:translateY(-2px);
            box-shadow:0 4px 12px rgba(79,172,254,.1);
        }

        /* market tab active 时持续微脉冲 */
        .tab-btn.active {
            box-shadow:0 0 16px rgba(79,172,254,.18);
        }

        /* k线区域 placeholder 加旋转 icon 替代静态文字 */
        .kline-placeholder { font-size:13px; }
        .kline-placeholder::before {
            content:''; width:24px; height:24px; border-radius:50%;
            border:2px solid rgba(79,172,254,.2);
            border-top-color:var(--primary);
            animation:spin 1s linear infinite;
        }

        /* news source block 入场 stagger */
        .news-source-block { animation:fade-in-up .5s var(--ease-out) both; }
        .news-source-block:nth-child(1) { animation-delay:.05s; }
        .news-source-block:nth-child(2) { animation-delay:.12s; }
        .news-source-block:nth-child(3) { animation-delay:.19s; }
        .news-source-block:nth-child(4) { animation-delay:.26s; }
        .news-item { transition:all var(--d-fast); }
        .news-item:hover { padding-left:14px; }
        .news-item:hover .news-rank {
            box-shadow:0 0 12px rgba(79,172,254,.3);
        }

        /* k线大数字加 hover glow */
        .kline-price { transition:filter var(--d-base); }
        .kline-panel:hover .kline-price { filter:drop-shadow(0 0 10px rgba(0,242,254,.4)); }

        /* skeleton 加载状态：sector heatmap 占位 */
        .sector-tile.skel-loading {
            background:linear-gradient(90deg,
                rgba(255,255,255,.04) 25%,
                rgba(255,255,255,.08) 50%,
                rgba(255,255,255,.04) 75%);
            background-size:400% 100%;
            animation:skel-pulse 1.5s infinite;
        }
    </style>
</head>

<script>
    'use strict';
    const _h = window.location.hostname;
    const API_BASE = (_h === 'localhost' || _h === '127.0.0.1')
        ? 'http://127.0.0.1:8000/api/v1'
        : '/api/v1';
    let currentTab = 'a';
    const _quoteCache = {};

    function escHtml(s) {
        const d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }

    // ── 指数滚动屏（逐行向上循环，每 5 秒滚 1 行）────────
    let _tickerRow = 0;
    let _tickerTotalRows = 0;
    let _tickerInterval = null;
    const _ROW_H = 38; // ticker-h/2 = 76/2 = 38px

    function _renderTickerItem(idx) {
        const pct = idx.change_pct || 0;
        const dir = pct > 0 ? 'up' : (pct < 0 ? 'down' : 'flat');
        const sign = pct > 0 ? '+' : '';
        const price = idx.price > 0 ? Number(idx.price).toLocaleString('zh-CN',{maximumFractionDigits:2}) : '--';
        const pctStr = idx.name === '--' ? '' : `${sign}${Number(pct).toFixed(2)}%`;
        return `<div class="ticker-item">
            <span class="ticker-name">${escHtml(idx.name)}</span>
            <span class="ticker-price">${price}</span>
            <span class="ticker-pct ${dir}">${pctStr}</span>
        </div>`;
    }

    function renderTicker(indices) {
        const slider = document.getElementById('ticker-slider');
        if (!indices || !indices.length) {
            slider.innerHTML = '<div class="ticker-row"><div class="ticker-item"><span class="ticker-name">加载中...</span></div></div>';
            return;
        }

        // 补齐到 32 的倍数（每行 8 个）
        while (indices.length < 32) indices.push({name:'--', price:0, change_pct:0});

        // 分行：每行 8 个
        const rows = [];
        for (let i = 0; i < indices.length; i += 8) {
            rows.push(indices.slice(i, i + 8));
        }
        _tickerTotalRows = rows.length;

        // 渲染所有行 + 复制前 2 行到末尾（循环衔接）
        const allRows = [...rows, ...rows.slice(0, 2)];
        slider.innerHTML = allRows.map(row =>
            `<div class="ticker-row">${row.map(_renderTickerItem).join('')}</div>`
        ).join('');

        // 自动滚动：每 5 秒向上 1 行
        if (_tickerInterval) clearInterval(_tickerInterval);
        _tickerRow = 0;
        slider.style.transform = 'translateY(0)';
        _tickerInterval = setInterval(() => {
            _tickerRow++;
            slider.style.transition = 'transform 0.5s ease';
            slider.style.transform = `translateY(-${_tickerRow * _ROW_H}px)`;

            // 滚到复制区后瞬移回起点
            if (_tickerRow >= _tickerTotalRows) {
                setTimeout(() => {
                    slider.style.transition = 'none';
                    _tickerRow = 0;
                    slider.style.transform = 'translateY(0)';
                }, 550);
            }
        }, 5000);
    }

    async function fetchIndices() {
        try {
            const r = await fetch(`${API_BASE}/market/indices`);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const d = await r.json();
            renderTicker(d.indices || []);
            document.getElementById('update-time').textContent =
                '更新于 ' + new Date().toLocaleTimeString('zh-CN',{hour12:false});
        } catch(e) {
            console.error('[market] indices error:', e);
        }
    }

    // ── 板块热力图 ──────────────────────────────────────────
    function sectorBgColor(pct) {
        const abs = Math.abs(pct);
        const alpha = Math.min(0.88, abs / 5 * 0.75 + 0.13);
        if (pct > 0.05) return `rgba(239,68,68,${alpha.toFixed(2)})`;
        if (pct < -0.05) return `rgba(34,197,94,${alpha.toFixed(2)})`;
        return 'rgba(255,255,255,0.06)';
    }

    function renderSectors(sectors) {
        const el = document.getElementById('sector-heatmap');
        if (!sectors || !sectors.length) {
            el.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--text-dim);font-size:11px">板块数据仅在交易时段可用</div>';
            return;
        }
        el.innerHTML = sectors.map(s => {
            const sign = s.change_pct > 0 ? '+' : '';
            return `<div class="sector-tile" style="background:${sectorBgColor(s.change_pct)}" title="${escHtml(s.name)} ${sign}${s.change_pct}% | 领涨:${escHtml(s.leader||'')}">
                <div class="sector-tile-name">${escHtml(s.name)}</div>
                <div class="sector-tile-pct">${sign}${s.change_pct.toFixed(2)}%</div>
            </div>`;
        }).join('');
    }

    async function fetchSectors() {
        try {
            const ctrl = new AbortController();
            setTimeout(() => ctrl.abort(), 10000);
            const r = await fetch(`${API_BASE}/market/sectors`, {signal: ctrl.signal});
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const d = await r.json();
            renderSectors(d.sectors || []);
            const el = document.getElementById('sector-update-time');
            if (el) el.textContent = new Date().toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
        } catch(e) {
            const el = document.getElementById('sector-heatmap');
            if (el) el.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:16px;color:var(--text-dim);font-size:11px">板块数据仅在交易时段可用</div>';
        }
    }

    // ── 情绪 ────────────────────────────────────────────────
    async function fetchSentiment() {
        try {
            const r = await fetch(`${API_BASE}/market/sentiment`);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const d = await r.json();
            const elUp = document.getElementById('sent-limit-up');
            const elDown = document.getElementById('sent-limit-down');
            const elVol = document.getElementById('sent-volume');
            const elNorth = document.getElementById('sent-north');
            if (elUp) elUp.textContent = d.limit_up || '--';
            if (elDown) elDown.textContent = d.limit_down || '--';
            if (elVol) elVol.textContent = d.volume || '--';
            if (elNorth && d.north_flow && d.north_flow !== '--') {
                elNorth.textContent = d.north_flow;
                elNorth.className = 'sent-val ' + ((d.north_flow_raw||0) >= 0 ? 'up' : 'down');
            } else if (elNorth) {
                elNorth.textContent = d.north_flow || '--';
            }
        } catch(e) {}
    }

    // ── 热门标的 ────────────────────────────────────────────
    function switchTab(btn, tab) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTab = tab;
        fetchAndRender(tab);
    }

    function renderQuotes(quotes, market) {
        const wrap = document.getElementById('table-wrap');
        if (!quotes || !quotes.length) { wrap.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-sub);font-size:12px">暂无数据</div>'; return; }
        const pfx = market === 'us' ? '$' : (market === 'hk' ? 'HK$' : '');
        wrap.innerHTML = `<table><thead><tr><th>代码</th><th>名称</th><th>最新价</th><th>涨跌幅</th></tr></thead><tbody>${
            quotes.map(q => {
                const dir = (q.change_pct >= 0) ? 'up' : 'down';
                const pctSign = (q.change_pct >= 0) ? '+' : '';
                const price = q.price != null ? pfx + Number(q.price).toFixed(2) : '--';
                const pct = q.change_pct != null ? pctSign + Number(q.change_pct).toFixed(2) + '%' : '--';
                return `<tr><td class="td-sym">${escHtml(q.symbol)}</td><td class="td-name">${escHtml(q.name||q.symbol)}</td><td class="td-price">${price}</td><td class="td-chg ${dir}">${pct}</td></tr>`;
            }).join('')
        }</tbody></table>`;
    }

    async function fetchAndRender(tab) {
        const cached = _quoteCache[tab];
        if (cached && Date.now() - cached.ts < 30000) { renderQuotes(cached.quotes, tab); return; }
        document.getElementById('table-wrap').innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-sub);font-size:12px">加载中...</div>';
        try {
            const r = await fetch(`${API_BASE}/market/quotes?market=${tab}`);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const d = await r.json();
            _quoteCache[tab] = { quotes: d.quotes||[], ts: Date.now() };
            renderQuotes(d.quotes||[], tab);
        } catch(e) {
            document.getElementById('table-wrap').innerHTML = '<div style="text-align:center;padding:20px;color:#ff6b6b;font-size:12px">行情加载失败</div>';
        }
    }

    // ── 新闻竖排 ────────────────────────────────────────────
    function renderNewsVertical(sources) {
        const panel = document.getElementById('news-panel');
        if (!sources || !sources.length) {
            panel.innerHTML = '<div class="news-empty">新闻加载中...</div>';
            return;
        }
        panel.innerHTML = sources.map(src => {
            const items = (src.items || []).slice(0, 3);
            const itemsHTML = items.length ? items.map((item, i) => {
                const rk = i < 3 ? `r${i+1}` : '';
                return `<a href="${escHtml(item.url||'#')}" target="_blank" rel="noopener" class="news-item">
                    <div class="news-rank ${rk}">${i+1}</div>
                    <div class="news-title">${escHtml(item.title)}</div>
                </a>`;
            }).join('') : '<div class="news-empty">暂无数据</div>';
            return `<div class="news-source-block">
                <div class="news-source-header" style="border-left:3px solid ${src.color||'var(--primary)'}">
                    <span style="color:${src.color||'#fff'}">${escHtml(src.label||src.source||'')}</span>
                </div>
                <div class="news-items-list">${itemsHTML}</div>
            </div>`;
        }).join('');
    }

    async function fetchHotNews(force) {
        try {
            const url = `${API_BASE}/market/hotnews` + (force ? '?force=true' : '');
            const r = await fetch(url);
            if (!r.ok) throw new Error(`HTTP ${r.status}`);
            const raw = await r.json();
            const srcList = Array.isArray(raw) ? raw : (raw.sources || []);
            renderNewsVertical(srcList);
        } catch(e) {
            document.getElementById('news-panel').innerHTML = '<div class="news-empty">新闻加载失败</div>';
        }
    }

    // ── 初始化 ──────────────────────────────────────────────
    fetchAndRender('a');
    fetchIndices();
    fetchSectors();
    fetchSentiment();
    fetchHotNews(false);

    setInterval(fetchIndices, 60000);
    setInterval(fetchSectors, 120000);
    setInterval(fetchSentiment, 180000);
    setInterval(() => fetchHotNews(false), 15*60*1000);
</script>

<!-- Lightweight Charts -->
<script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
<script>
    'use strict';
    let _klChart = null, _klSeries = null, _klRO = null;
    let _klCurSym = '', _klCurPeriod = 'daily', _klLoading = false;

    function switchPeriod(btn, period) {
        document.querySelectorAll('.kp-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        _klCurPeriod = period;
        if (_klCurSym) loadKline();
    }

    function _showKlinePlaceholder(html) {
        const ph = document.getElementById('kline-placeholder');
        ph.innerHTML = html; ph.classList.remove('hide');
        document.getElementById('kline-info').style.display = 'none';
        document.getElementById('kline-cta').style.display = 'none';
    }

    function _destroyChart() {
        if (_klRO) { _klRO.disconnect(); _klRO = null; }
        if (_klChart) { try { _klChart.remove(); } catch(e){} _klChart = null; _klSeries = null; }
        const el = document.getElementById('kline-chart');
        if (el) el.innerHTML = '';
    }

    function _buildChart() {
        const el = document.getElementById('kline-chart');
        const h = el.parentElement.offsetHeight || 200;
        const w = el.parentElement.offsetWidth || 600;
        _klChart = LightweightCharts.createChart(el, {
            layout: { background: { color: '#0b0f19' }, textColor: '#a0aec0' },
            grid: { vertLines: { color: 'rgba(255,255,255,0.05)' }, horzLines: { color: 'rgba(255,255,255,0.05)' } },
            crosshair: { mode: 1 },
            rightPriceScale: { borderColor: 'rgba(255,255,255,0.12)' },
            timeScale: { borderColor: 'rgba(255,255,255,0.12)', timeVisible: true },
            width: w, height: h,
        });
        _klSeries = _klChart.addCandlestickSeries({
            upColor: '#00b894', downColor: '#d63031',
            borderUpColor: '#00b894', borderDownColor: '#d63031',
            wickUpColor: '#00b894', wickDownColor: '#d63031',
        });
        _klRO = new ResizeObserver(() => {
            if (!_klChart) return;
            const nw = el.parentElement.offsetWidth;
            const nh = el.parentElement.offsetHeight;
            if (nw > 0) _klChart.applyOptions({ width: nw, height: nh });
        });
        _klRO.observe(el.parentElement);
    }

    let _suggestTimer = null;
    function _onKlineSearch(q) {
        clearTimeout(_suggestTimer);
        const box = document.getElementById('kline-suggest');
        if (!q || q.length < 1) { box.style.display = 'none'; return; }
        _suggestTimer = setTimeout(async () => {
            try {
                const r = await fetch(`${API_BASE}/market/search?q=${encodeURIComponent(q)}`);
                const d = await r.json();
                const items = d.suggestions || [];
                if (!items.length) { box.style.display = 'none'; return; }
                box.innerHTML = items.map(s =>
                    `<div style="padding:6px 10px;cursor:pointer;border-bottom:1px solid var(--border);color:#e2e8f0;font-size:12px;" onmouseover="this.style.background='rgba(255,255,255,0.08)'" onmouseout="this.style.background=''" onclick="_selectKlineSuggest('${escHtml(s.symbol)}','${escHtml(s.name)}')">${escHtml(s.symbol)} <span style="color:var(--text-dim)">${escHtml(s.name)}</span></div>`
                ).join('');
                box.style.display = 'block';
            } catch(e) { box.style.display = 'none'; }
        }, 300);
    }
    function _selectKlineSuggest(symbol) {
        document.getElementById('kline-input').value = symbol;
        document.getElementById('kline-suggest').style.display = 'none';
        loadKline();
    }
    document.addEventListener('click', e => {
        if (!e.target.closest('.kline-search-wrap')) {
            const box = document.getElementById('kline-suggest');
            if (box) box.style.display = 'none';
        }
    });

    async function loadKline() {
        if (_klLoading) return;
        const sym = document.getElementById('kline-input').value.trim();
        if (!sym) return;
        _klCurSym = sym.toUpperCase();
        _klLoading = true;
        _showKlinePlaceholder(`<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--primary)" stroke-width="2" style="animation:spin 1s linear infinite"><circle cx="12" cy="12" r="10" stroke-dasharray="31.4" stroke-dashoffset="10"/></svg><div>加载 ${escHtml(_klCurSym)}...</div>`);
        try {
            const r = await fetch(`${API_BASE}/market/kline?symbol=${encodeURIComponent(_klCurSym)}&period=${_klCurPeriod}&count=120`);
            if (!r.ok) throw new Error((await r.json().catch(()=>({}))).detail || `HTTP ${r.status}`);
            const data = await r.json();
            const candles = data.kline || [];
            if (!candles.length) { _showKlinePlaceholder(`<div style="color:var(--danger)">暂无K线数据</div>`); return; }
            _destroyChart(); _buildChart();
            document.getElementById('kline-placeholder').classList.add('hide');
            _klSeries.setData(candles);
            _klChart.timeScale().fitContent();
            const last = candles[candles.length-1], prev = candles[candles.length-2]||last;
            const chg = last.close - prev.close, pct = prev.close > 0 ? chg/prev.close*100 : 0;
            const pe = document.getElementById('kline-price');
            pe.textContent = Number(last.close).toFixed(2) + ' (' + (chg>=0?'+':'') + pct.toFixed(2) + '%)';
            pe.className = 'kline-price ' + (chg >= 0 ? 'up' : 'down');
            document.getElementById('kline-sym-name').textContent = (data.name && data.name !== _klCurSym ? data.name+' ' : '') + _klCurSym;
            document.getElementById('kline-meta').textContent = `${candles.length}根 ${{daily:'日K',weekly:'周K',monthly:'月K'}[_klCurPeriod]}`;
            document.getElementById('kline-info').style.display = 'flex';
            document.getElementById('kline-cta-link').href = `analysis.html?sym=${encodeURIComponent(_klCurSym)}`;
            document.getElementById('kline-cta').style.display = 'flex';
        } catch(e) {
            _showKlinePlaceholder(`<div style="color:var(--danger)">K线失败: ${escHtml(e.message)}</div>`);
        } finally { _klLoading = false; }
    }
</script>
