<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trading Agent - 智能量化交易辅助系统</title>
    <style>
        /* 基础重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            background-color: #0b0f19; /* 深色科技感背景 */
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            /* 科技感背景光晕 */
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(0, 242, 254, 0.1), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(79, 172, 254, 0.1), transparent 25%);
        }

        /* 顶部悬浮导航栏 */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            background: rgba(11, 15, 25, 0.7); /* 半透明背景 */
            backdrop-filter: blur(10px); /* 毛玻璃效果 */
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            cursor: pointer;
        }

        nav {
            display: flex;
            gap: 30px;
        }

        nav a {
            text-decoration: none;
            color: #a0aec0;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        nav a:hover {
            color: #00f2fe;
            text-shadow: 0 0 8px rgba(0, 242, 254, 0.5);
        }

        nav a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 2px;
            bottom: -5px;
            left: 0;
            background: linear-gradient(90deg, #4facfe, #00f2fe);
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* 页面主体 - 居中搜索区 */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            margin-top: 80px; /* 避开悬浮头部 */
            padding: 0 20px;
        }

        main h1 {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        main p {
            color: #a0aec0;
            font-size: 18px;
            margin-bottom: 40px;
            max-width: 600px;
        }

        /* 搜索框容器 */
        .search-container {
            display: flex;
            width: 100%;
            max-width: 700px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            padding: 5px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .search-container:focus-within {
            border-color: #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }

        .search-container input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 18px 30px;
            color: #fff;
            font-size: 16px;
            outline: none;
        }

        .search-container input::placeholder {
            color: #4a5568;
        }

        .search-container button {
            background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%);
            color: #0b0f19;
            border: none;
            border-radius: 40px;
            padding: 0 35px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-container button:hover {
            transform: scale(1.02);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.4);
        }

        /* 底部页脚 */
        footer {
            padding: 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .team-info {
            color: #718096;
            font-size: 14px;
        }

        .team-info a {
            color: #4facfe;
            text-decoration: none;
            transition: color 0.3s;
        }

        .team-info a:hover {
            color: #00f2fe;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Trading Agent</div>
        <nav>
            <a href="#home">Home</a>
            <a href="#trade">Trade</a>
            <a href="#platforms">Platforms</a>
            <a href="#market">Market</a>
            <a href="#resources">Resources</a>
            <a href="#company">Company</a>
            <a href="#community">Community</a>
        </nav>
    </header>

    <main>
        <h1>重塑您的量化交易体验</h1>
        <p>输入市场代码、策略逻辑或直接用自然语言提问，我们的 AI 交易助手将为您深度解析数据并生成策略代码。</p>
        
        <div class="search-container">
            <input type="text" id="ai-input" placeholder="例如：帮我生成一个针对比特币的MACD底背离策略..." autocomplete="off">
            <button id="ai-submit">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
                向 AI 提问
            </button>
        </div>
    </main>

    <footer>
        <div class="team-info">
            &copy; 2026 Trading Agent Team. 致力于用人工智能赋能每一位交易者. <br>
            Designed & Developed by <a href="#">Trading Agent Team</a>.
        </div>
    </footer>

</body>
</html>
