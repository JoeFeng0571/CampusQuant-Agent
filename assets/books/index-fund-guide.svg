<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#062b3a"/>
      <stop offset="100%" stop-color="#2ca3b0"/>
    </linearGradient>
    <linearGradient id="curve" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd37c" stop-opacity=".2"/>
      <stop offset="100%" stop-color="#ffd37c" stop-opacity="1"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" rx="24" fill="url(#g)"/>
  <rect x="42" y="42" width="516" height="716" rx="18" fill="none" stroke="#ffffff" stroke-opacity=".18" stroke-width="2"/>

  <!-- 复利曲线 -->
  <g transform="translate(80,140)">
    <!-- 坐标轴 -->
    <line x1="0" y1="0" x2="0" y2="260" stroke="#ffffff" stroke-opacity=".4" stroke-width="2.5"/>
    <line x1="0" y1="260" x2="440" y2="260" stroke="#ffffff" stroke-opacity=".4" stroke-width="2.5"/>
    <!-- 网格 -->
    <g stroke="#ffffff" stroke-opacity=".08" stroke-width="1">
      <line x1="0" y1="200" x2="440" y2="200"/>
      <line x1="0" y1="140" x2="440" y2="140"/>
      <line x1="0" y1="80" x2="440" y2="80"/>
      <line x1="100" y1="0" x2="100" y2="260"/>
      <line x1="200" y1="0" x2="200" y2="260"/>
      <line x1="300" y1="0" x2="300" y2="260"/>
      <line x1="400" y1="0" x2="400" y2="260"/>
    </g>
    <!-- 复利曲线填充 -->
    <path d="M 0 260 Q 100 250 160 225 T 280 140 T 400 20 L 400 260 Z" fill="url(#curve)" opacity=".5"/>
    <!-- 复利曲线 -->
    <path d="M 0 260 Q 100 250 160 225 T 280 140 T 400 20" fill="none" stroke="#ffd37c" stroke-width="5" stroke-linecap="round"/>
    <!-- 定投点 -->
    <circle cx="40" cy="259" r="6" fill="#ffffff"/>
    <circle cx="120" cy="248" r="6" fill="#ffffff"/>
    <circle cx="200" cy="205" r="6" fill="#ffffff"/>
    <circle cx="280" cy="140" r="6" fill="#ffffff"/>
    <circle cx="360" cy="58" r="6" fill="#ffffff"/>
    <!-- 右上显眼节点 -->
    <circle cx="400" cy="20" r="11" fill="#ffffff" stroke="#ffd37c" stroke-width="4"/>
    <!-- Y 轴标签 -->
    <text x="-8" y="8" fill="#ffffff" fill-opacity=".6" font-size="14" text-anchor="end" font-family="Segoe UI, sans-serif">¥</text>
    <text x="448" y="270" fill="#ffffff" fill-opacity=".6" font-size="14" font-family="Segoe UI, sans-serif">time</text>
  </g>

  <text x="64" y="118" fill="#ffffff" fill-opacity=".78" font-size="22" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" letter-spacing="2">CAMPUSQUANT BOOKLIST</text>
  <text x="64" y="475" fill="#ffffff" font-size="50" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">指数基金</text>
  <text x="64" y="540" fill="#ffffff" font-size="54" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">投资指南</text>
  <line x1="64" y1="590" x2="240" y2="590" stroke="#ffd37c" stroke-width="5" stroke-linecap="round"/>
  <text x="64" y="638" fill="#ffffff" fill-opacity=".92" font-size="28" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">银行螺丝钉</text>
  <text x="64" y="702" fill="#ffd37c" fill-opacity=".9" font-size="16" letter-spacing="2" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">指数基金 · 长期定投 · 低门槛</text>
  <text x="64" y="730" fill="#ffffff" fill-opacity=".55" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">投资学习中心精选书单</text>
</svg>
