<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c2340"/>
      <stop offset="100%" stop-color="#2d6cdf"/>
    </linearGradient>
  </defs>
  <rect width="600" height="800" rx="24" fill="url(#g)"/>
  <rect x="42" y="42" width="516" height="716" rx="18" fill="none" stroke="#ffffff" stroke-opacity=".18" stroke-width="2"/>

  <!-- 三张叠层报表 -->
  <g transform="translate(300,190)">
    <!-- 报表 3（最后） -->
    <rect x="-110" y="-50" width="220" height="150" rx="10" fill="#e8f0fb" transform="rotate(-8 0 25)"/>
    <g transform="rotate(-8 0 25)" opacity=".6">
      <line x1="-90" y1="-20" x2="90" y2="-20" stroke="#4a6fb7" stroke-width="3"/>
      <line x1="-90" y1="0" x2="60" y2="0" stroke="#4a6fb7" stroke-width="2"/>
      <line x1="-90" y1="15" x2="70" y2="15" stroke="#4a6fb7" stroke-width="2"/>
      <line x1="-90" y1="30" x2="40" y2="30" stroke="#4a6fb7" stroke-width="2"/>
      <line x1="-90" y1="45" x2="80" y2="45" stroke="#4a6fb7" stroke-width="2"/>
      <line x1="-90" y1="60" x2="55" y2="60" stroke="#4a6fb7" stroke-width="2"/>
      <text x="-90" y="80" fill="#2a4a9e" font-size="12" font-weight="700" font-family="Segoe UI, sans-serif">CASH FLOW</text>
    </g>
    <!-- 报表 2 -->
    <rect x="-110" y="-70" width="220" height="150" rx="10" fill="#f5f9ff" transform="rotate(-2 0 5)"/>
    <g transform="rotate(-2 0 5)" opacity=".7">
      <line x1="-90" y1="-40" x2="90" y2="-40" stroke="#355bb8" stroke-width="3"/>
      <line x1="-90" y1="-20" x2="60" y2="-20" stroke="#355bb8" stroke-width="2"/>
      <line x1="-90" y1="-5" x2="70" y2="-5" stroke="#355bb8" stroke-width="2"/>
      <line x1="-90" y1="10" x2="50" y2="10" stroke="#355bb8" stroke-width="2"/>
      <line x1="-90" y1="25" x2="80" y2="25" stroke="#355bb8" stroke-width="2"/>
      <line x1="-90" y1="40" x2="55" y2="40" stroke="#355bb8" stroke-width="2"/>
      <text x="-90" y="60" fill="#2a4a9e" font-size="12" font-weight="700" font-family="Segoe UI, sans-serif">BALANCE SHEET</text>
    </g>
    <!-- 报表 1（最上） -->
    <rect x="-110" y="-90" width="220" height="150" rx="10" fill="#ffffff" stroke="#2a4a9e" stroke-width="1"/>
    <line x1="-90" y1="-60" x2="90" y2="-60" stroke="#1a3a8e" stroke-width="3"/>
    <line x1="-90" y1="-40" x2="60" y2="-40" stroke="#1a3a8e" stroke-width="2"/>
    <line x1="-90" y1="-25" x2="70" y2="-25" stroke="#1a3a8e" stroke-width="2"/>
    <line x1="-90" y1="-10" x2="50" y2="-10" stroke="#1a3a8e" stroke-width="2"/>
    <line x1="-90" y1="5" x2="80" y2="5" stroke="#1a3a8e" stroke-width="2"/>
    <line x1="-90" y1="20" x2="45" y2="20" stroke="#1a3a8e" stroke-width="2"/>
    <text x="-90" y="42" fill="#1a3a8e" font-size="13" font-weight="700" font-family="Segoe UI, sans-serif">INCOME STATEMENT</text>
    <!-- 上升箭头小图 -->
    <g transform="translate(65,-30)" stroke="#2a9e5a" stroke-width="3" fill="none" stroke-linecap="round">
      <polyline points="-10,10 -3,3 4,8 12,-4"/>
    </g>
  </g>

  <text x="64" y="118" fill="#ffffff" fill-opacity=".78" font-size="22" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" letter-spacing="2">CAMPUSQUANT BOOKLIST</text>
  <text x="64" y="460" fill="#ffffff" font-size="52" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">手把手教你</text>
  <text x="64" y="525" fill="#ffffff" font-size="62" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">读财报</text>
  <line x1="64" y1="575" x2="240" y2="575" stroke="#ffd37c" stroke-width="5" stroke-linecap="round"/>
  <text x="64" y="622" fill="#ffffff" fill-opacity=".92" font-size="28" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">唐朝</text>
  <text x="64" y="702" fill="#ffd37c" fill-opacity=".9" font-size="16" letter-spacing="2" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">三大报表 · 中文语境 · 财报入门</text>
  <text x="64" y="730" fill="#ffffff" fill-opacity=".55" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">投资学习中心精选书单</text>
</svg>
