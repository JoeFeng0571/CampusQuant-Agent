<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1b1040"/>
      <stop offset="100%" stop-color="#4d42a8"/>
    </linearGradient>
    <radialGradient id="seal" cx=".5" cy=".4" r=".6">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="100%" stop-color="#a02020"/>
    </radialGradient>
  </defs>
  <rect width="600" height="800" rx="24" fill="url(#g)"/>
  <rect x="42" y="42" width="516" height="716" rx="18" fill="none" stroke="#ffffff" stroke-opacity=".18" stroke-width="2"/>

  <!-- 信封 + 蜡印 -->
  <g transform="translate(300,200)">
    <!-- 信封主体 -->
    <rect x="-140" y="-80" width="280" height="170" rx="6" fill="#f2e3c6" stroke="#6b5433" stroke-width="3"/>
    <!-- 信封封盖三角形 -->
    <path d="M -140 -80 L 0 30 L 140 -80 Z" fill="#e6d3ae" stroke="#6b5433" stroke-width="3"/>
    <!-- 信封底部斜纹 -->
    <line x1="-140" y1="90" x2="0" y2="-5" stroke="#6b5433" stroke-width="2" stroke-opacity=".5"/>
    <line x1="140" y1="90" x2="0" y2="-5" stroke="#6b5433" stroke-width="2" stroke-opacity=".5"/>
    <!-- 蜡印 -->
    <circle cx="0" cy="12" r="32" fill="url(#seal)" stroke="#5e0a0a" stroke-width="2"/>
    <circle cx="0" cy="12" r="26" fill="none" stroke="#ffe0e0" stroke-width="1.5" stroke-opacity=".7"/>
    <text x="0" y="20" text-anchor="middle" fill="#ffe0e0" font-size="22" font-weight="700" font-family="Segoe UI, serif">B</text>
    <!-- 星标小装饰 -->
    <circle cx="-80" cy="-120" r="3" fill="#ffd37c" opacity=".7"/>
    <circle cx="90" cy="-130" r="2" fill="#ffd37c" opacity=".7"/>
    <circle cx="110" cy="-100" r="2.5" fill="#ffd37c" opacity=".7"/>
  </g>

  <text x="64" y="118" fill="#ffffff" fill-opacity=".78" font-size="22" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif" letter-spacing="2">CAMPUSQUANT BOOKLIST</text>
  <text x="64" y="420" fill="#ffffff" font-size="46" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">巴菲特致</text>
  <text x="64" y="478" fill="#ffffff" font-size="56" font-weight="700" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">股东的信</text>
  <line x1="64" y1="530" x2="240" y2="530" stroke="#ffd37c" stroke-width="5" stroke-linecap="round"/>
  <text x="64" y="578" fill="#ffffff" fill-opacity=".92" font-size="28" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">沃伦·巴菲特</text>
  <text x="64" y="702" fill="#ffd37c" fill-opacity=".9" font-size="16" letter-spacing="2" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">资本配置 · 企业经营 · 复读价值高</text>
  <text x="64" y="730" fill="#ffffff" fill-opacity=".55" font-size="16" font-family="Segoe UI, PingFang SC, Microsoft YaHei, sans-serif">投资学习中心精选书单</text>
</svg>
