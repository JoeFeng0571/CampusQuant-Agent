<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录/注册 · CampusQuant 校园财商</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box;
            font-family:'Segoe UI',Roboto,'Helvetica Neue',Arial,'PingFang SC','Microsoft YaHei',sans-serif; }
        :root {
            --primary:#4facfe; --secondary:#00f2fe; --accent:#a29bfe;
            --danger:#fd79a8;  --success:#55efc4;  --warn:#fdcb6e;
            --bg:#0b0f19; --card:rgba(255,255,255,0.05); --border:rgba(255,255,255,0.10);
            --text-dim:#718096; --text-sub:#a0aec0;
        }
        body {
            background-color:var(--bg); color:#fff; min-height:100vh;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            background-image:
                radial-gradient(circle at 20% 40%,rgba(0,242,254,0.10),transparent 40%),
                radial-gradient(circle at 80% 60%,rgba(79,172,254,0.10),transparent 40%);
        }
        .logo-wrap { text-align:center; margin-bottom:32px; }
        .logo-text { font-size:28px; font-weight:800;
            background:linear-gradient(90deg,#4facfe,#00f2fe);
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        .logo-sub { font-size:13px; color:var(--text-dim); margin-top:4px; }

        .card {
            width:100%; max-width:420px; background:var(--card);
            border:1px solid var(--border); border-radius:20px;
            padding:36px 40px; backdrop-filter:blur(12px);
            box-shadow:0 20px 60px rgba(0,0,0,0.4);
        }

        /* 选项卡 */
        .tabs { display:flex; gap:0; margin-bottom:28px; border-bottom:1px solid var(--border); }
        .tab-btn {
            flex:1; padding:10px; background:transparent; border:none;
            color:var(--text-sub); font-size:15px; font-weight:600;
            cursor:pointer; transition:all 0.2s; border-bottom:2px solid transparent;
            margin-bottom:-1px;
        }
        .tab-btn.active { color:var(--secondary); border-bottom-color:var(--secondary); }

        /* 表单 */
        .form { display:none; flex-direction:column; gap:18px; }
        .form.active { display:flex; }

        .field label { display:block; font-size:12px; color:var(--text-sub);
            margin-bottom:6px; font-weight:500; letter-spacing:0.3px; }
        .field input {
            width:100%; padding:11px 16px; border-radius:10px;
            background:rgba(255,255,255,0.06); border:1px solid var(--border);
            color:#fff; font-size:14px; outline:none; transition:border-color 0.2s;
        }
        .field input:focus { border-color:var(--primary); background:rgba(79,172,254,0.08); }

        .btn-submit {
            padding:13px; border-radius:12px; border:none; cursor:pointer;
            background:linear-gradient(135deg,var(--primary),var(--secondary));
            color:#fff; font-size:15px; font-weight:700;
            transition:opacity 0.2s, transform 0.1s; width:100%; margin-top:4px;
        }
        .btn-submit:hover { opacity:0.9; transform:translateY(-1px); }
        .btn-submit:active { transform:translateY(0); }
        .btn-submit:disabled { opacity:0.5; cursor:not-allowed; transform:none; }

        .msg { padding:10px 14px; border-radius:8px; font-size:13px; text-align:center; display:none; }
        .msg.error   { background:rgba(253,121,168,0.12); border:1px solid rgba(253,121,168,0.3); color:var(--danger); }
        .msg.success { background:rgba(85,239,196,0.12); border:1px solid rgba(85,239,196,0.3); color:var(--success); }

        .back-link {
            text-align:center; font-size:13px; color:var(--text-dim); margin-top:20px;
        }
        .back-link a { color:var(--primary); text-decoration:none; }
        .back-link a:hover { text-decoration:underline; }

        .divider { text-align:center; font-size:12px; color:var(--text-dim);
            margin:4px 0; display:flex; align-items:center; gap:12px; }
        .divider::before, .divider::after { content:''; flex:1; height:1px; background:var(--border); }
    </style>
</head>
<body>

<div class="logo-wrap">
    <div class="logo-text">CampusQuant</div>
    <div class="logo-sub">校园财商智能分析平台</div>
</div>

<div class="card">
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('login')">登 录</button>
        <button class="tab-btn"       onclick="switchTab('register')">注 册</button>
    </div>

    <!-- 登录表单 -->
    <form class="form active" id="form-login" onsubmit="handleLogin(event)">
        <div class="field">
            <label>邮箱</label>
            <input type="email" id="login-email" placeholder="your@email.com" required>
        </div>
        <div class="field">
            <label>密码</label>
            <input type="password" id="login-pwd" placeholder="请输入密码" required>
        </div>
        <div class="msg" id="login-msg"></div>
        <button type="submit" class="btn-submit" id="btn-login">登 录</button>
    </form>

    <!-- 注册表单 -->
    <form class="form" id="form-register" onsubmit="handleRegister(event)">
        <div class="field">
            <label>用户名</label>
            <input type="text" id="reg-username" placeholder="2-50位字符" minlength="2" maxlength="50" required>
        </div>
        <div class="field">
            <label>邮箱</label>
            <input type="email" id="reg-email" placeholder="your@email.com" required>
        </div>
        <div class="field">
            <label>密码</label>
            <input type="password" id="reg-pwd" placeholder="至少6位" minlength="6" required>
        </div>
        <div class="field">
            <label>确认密码</label>
            <input type="password" id="reg-pwd2" placeholder="再次输入密码" required>
        </div>
        <div class="msg" id="reg-msg"></div>
        <button type="submit" class="btn-submit" id="btn-register">注 册</button>
    </form>
</div>

<div class="back-link">
    <a href="dashboard.html">← 返回首页</a>
    &nbsp;·&nbsp;
    <a href="trade.html">直接体验（游客模式）</a>
</div>

<script>
    'use strict';
    const API_BASE = 'http://127.0.0.1:8000';

    // 已登录则直接跳转
    if (localStorage.getItem('cq_token')) {
        const redirect = new URLSearchParams(location.search).get('redirect') || 'trade.html';
        location.href = redirect;
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab-btn').forEach((b, i) =>
            b.classList.toggle('active', (i === 0) === (tab === 'login'))
        );
        document.getElementById('form-login').classList.toggle('active', tab === 'login');
        document.getElementById('form-register').classList.toggle('active', tab === 'register');
    }

    function showMsg(id, text, type) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.className   = 'msg ' + type;
        el.style.display = 'block';
    }

    async function handleLogin(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-login');
        btn.disabled = true; btn.textContent = '登录中…';

        try {
            const resp = await fetch(`${API_BASE}/api/v1/auth/login`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({
                    email:    document.getElementById('login-email').value.trim(),
                    password: document.getElementById('login-pwd').value,
                }),
            });
            const data = await resp.json();
            if (!resp.ok) { showMsg('login-msg', data.detail || '登录失败', 'error'); return; }

            localStorage.setItem('cq_token',    data.token);
            localStorage.setItem('cq_username', data.username);
            localStorage.setItem('cq_user_id',  data.user_id);

            showMsg('login-msg', `欢迎回来，${data.username}！跳转中…`, 'success');
            setTimeout(() => {
                const redirect = new URLSearchParams(location.search).get('redirect') || 'trade.html';
                location.href = redirect;
            }, 800);
        } catch(err) {
            showMsg('login-msg', '网络错误，请检查后端是否启动', 'error');
        } finally {
            btn.disabled = false; btn.textContent = '登 录';
        }
    }

    async function handleRegister(e) {
        e.preventDefault();
        const pwd  = document.getElementById('reg-pwd').value;
        const pwd2 = document.getElementById('reg-pwd2').value;
        if (pwd !== pwd2) { showMsg('reg-msg', '两次密码不一致', 'error'); return; }

        const btn = document.getElementById('btn-register');
        btn.disabled = true; btn.textContent = '注册中…';

        try {
            const resp = await fetch(`${API_BASE}/api/v1/auth/register`, {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({
                    username: document.getElementById('reg-username').value.trim(),
                    email:    document.getElementById('reg-email').value.trim(),
                    password: pwd,
                }),
            });
            const data = await resp.json();
            if (!resp.ok) { showMsg('reg-msg', data.detail || '注册失败', 'error'); return; }

            localStorage.setItem('cq_token',    data.token);
            localStorage.setItem('cq_username', data.username);
            localStorage.setItem('cq_user_id',  data.user_id);

            showMsg('reg-msg', data.message || '注册成功！跳转中…', 'success');
            setTimeout(() => { location.href = 'trade.html'; }, 900);
        } catch(err) {
            showMsg('reg-msg', '网络错误，请检查后端是否启动', 'error');
        } finally {
            btn.disabled = false; btn.textContent = '注 册';
        }
    }
</script>
</body>
</html>
